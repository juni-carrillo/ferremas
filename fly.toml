# fly.toml app configuration file generated for ferremas on 2026-05-26T14:48:28-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ferremas'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "ferremas_data"
  destination = "/app/data"

[env]
  DATABASE_URL = "sqlite:///./data/ferremas.db"
